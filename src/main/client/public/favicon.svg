<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyan to Emerald Gradient matching the original theme exactly -->
    <linearGradient id="biotechGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>

  <!-- Clean, crisp dark circular base for favicon visibility -->
  <circle cx="256" cy="256" r="240" fill="#0f172a"/>

  <!-- Centered BioVault Icon Shield Blueprint -->
  <g transform="translate(4, 8)">
    <!-- Outer Shield Profile -->
    <path 
      d="M252 80 L410 135 V285 C410 380 252 440 252 440 C252 440 94 380 94 285 V135 Z" 
      stroke="url(#biotechGrad)" 
      stroke-width="18" 
      fill="none" 
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    
    <!-- Vertical Central Core Helix Strand -->
    <path d="M252 145 V375" stroke="url(#biotechGrad)" stroke-width="16" stroke-dasharray="1 30" stroke-linecap="round" />
    
    <!-- Clean Interlocking DNA Helix Formations -->
    <path d="M195 195 C 252 195, 252 325, 309 325" stroke="url(#biotechGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M195 325 C 252 325, 252 195, 309 195" stroke="url(#biotechGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>

    <!-- Four Outer Helix Nodes matching original specific colors -->
    <circle cx="195" cy="195" r="14" fill="#06b6d4" />
    <circle cx="309" cy="195" r="14" fill="#10b981" />
    <circle cx="195" cy="325" r="14" fill="#10b981" />
    <circle cx="309" cy="325" r="14" fill="#06b6d4" />
    
    <!-- Central White Target Dot -->
    <circle cx="252" cy="250" r="16" fill="#ffffff" stroke="url(#biotechGrad)" stroke-width="8" />
  </g>
</svg>
